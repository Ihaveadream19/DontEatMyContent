name: Build Return YouTube Dislikes

on:

  push:

    branches:

      - master

    paths-ignore:

      - 'README.md'

      - 'LICENSE.md'

      - '.github/**'

      - control

  workflow_dispatch:

jobs:

  build:

    runs-on: macos-latest

    steps:

      - name: Checkout Project

        uses: actions/checkout@v4

        with:

          submodules: recursive

      - name: Setup Theos

        run: |

          git clone --recursive https://github.com/theos/theos.git $HOME/theos

          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV

      - name: Setup SDKs

        run: |

          rm -rf $HOME/theos/sdks

          git clone --depth 1 https://github.com/theos/sdks.git $HOME/theos/sdks

      - name: Install dependencies

        run: brew install ldid make xz

      - name: Build

        run: |

          make clean || true

          make package FINALPACKAGE=1

      - name: Find outputs

        run: |

          find .theos -name "*.dylib"

          find .theos -name "*.bundle" || true

          ls packages || true

      - name: Upload artifact

        uses: actions/upload-artifact@v4

        with:

          name: Return-YouTube-Dislikes

          path: |

            packages/

            .theos/obj/
